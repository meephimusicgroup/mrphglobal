server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name 167.233.230.221 _;

    root /opt/ping-explorer/dist;
    index index.html;

    # Branded landing (static — survives explorer rebuilds)
    location = /landing.html {
        alias /opt/mrphglobal/public/landing.html;
        default_type text/html;
    }

    location = /home {
        return 302 /landing.html;
    }

    location = / {
        return 302 /ping/mrphglobal;
    }

    # API proxy for landing page (same-origin, no CORS)
    location /api/rpc/ {
        proxy_pass http://127.0.0.1:26657/;
        proxy_http_version 1.1;
        add_header Access-Control-Allow-Origin *;
    }

    location /api/lcd/ {
        proxy_pass http://127.0.0.1:1317/;
        proxy_http_version 1.1;
        add_header Access-Control-Allow-Origin *;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /logos/ {
        alias /opt/ping-explorer/public/logos/;
    }
}
