name: Build

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify and build
        env:
          GOFLAGS: "-buildvcs=false"
        run: |
          go mod verify
          go build -mod=readonly -o /tmp/mrphglobald ./cmd/mrphglobald

      - name: Unit tests
        env:
          GOFLAGS: "-buildvcs=false"
        run: go test -mod=readonly -timeout 15m ./...
