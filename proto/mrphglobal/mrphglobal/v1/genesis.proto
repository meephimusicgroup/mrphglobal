syntax = "proto3";
package mrphglobal.mrphglobal.v1;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "mrphglobal/mrphglobal/v1/params.proto";

option go_package = "mrphglobal/x/mrphglobal/types";

// GenesisState defines the mrphglobal module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}
